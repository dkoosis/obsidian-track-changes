name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        # Obsidian runs on Windows, macOS, and Linux — exercise all three.
        # The suite is in-memory JS (CRLF cases are constructed with \n / \r\n
        # escapes in the test strings, so they're independent of how git checks
        # files out), but running on Windows guards against platform-specific
        # regressions in tooling, path handling, and any future on-disk fixtures.
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
